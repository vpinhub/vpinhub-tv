name: Check Live Streams

on:
  schedule:
    - cron: '0,30 * * * *'  # every 30 minutes, at :00 and :30
  workflow_dispatch:          # allow manual trigger from Actions tab

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Check live streams
        run: python scripts/check_live.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add live_status.json
          git diff --cached --quiet && echo "No change" || \
            git commit -m "auto: update live status $(date -u +%H:%M)"
          git push
