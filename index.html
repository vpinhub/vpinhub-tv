<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPINHUB TV</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Encode+Sans:wght@400;700;900&family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Encode Sans', sans-serif; background: #020617; color: white; overflow-x: hidden; }
        .medieval { font-family: 'MedievalSharp', cursive; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
        .hero-gradient { background: radial-gradient(circle at top, #1e293b 0%, #020617 70%); }

        .channel-card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; }
        .channel-card:hover { transform: translateY(-6px) scale(1.02); border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.06); }
        .channel-card.active { border-color: rgba(6,182,212,0.6); background: rgba(6,182,212,0.05); }

        .live-badge { background: #ef4444; color: white; font-size: 9px; font-weight: 900; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.05em; display: inline-flex; align-items: center; gap: 4px; box-shadow: 0 0 15px rgba(239,68,68,0.4); }
        .live-dot { height: 6px; width: 6px; background: white; border-radius: 50%; animation: pulse 1.5s infinite; }
        .offline-badge { background: #1e293b; color: #64748b; font-size: 9px; font-weight: 900; padding: 2px 10px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.05em; display: inline-flex; align-items: center; gap: 4px; border: 1px solid rgba(255,255,255,0.08); }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

        .color-amber  { --accent: #f59e0b; --accent-bg: rgba(245,158,11,0.15); --accent-dim: rgba(245,158,11,0.2); }
        .color-emerald{ --accent: #10b981; --accent-bg: rgba(16,185,129,0.15); --accent-dim: rgba(16,185,129,0.2); }
        .color-cyan   { --accent: #06b6d4; --accent-bg: rgba(6,182,212,0.15);  --accent-dim: rgba(6,182,212,0.2);  }
        .color-fuchsia{ --accent: #d946ef; --accent-bg: rgba(217,70,239,0.15); --accent-dim: rgba(217,70,239,0.2); }
        .color-orange { --accent: #f97316; --accent-bg: rgba(249,115,22,0.15); --accent-dim: rgba(249,115,22,0.2); }
        .color-indigo { --accent: #6366f1; --accent-bg: rgba(99,102,241,0.15); --accent-dim: rgba(99,102,241,0.2); }

        .channel-card .card-border { border-top-color: var(--accent); }
        .channel-card .card-tag   { background: var(--accent-dim); color: var(--accent); }
        .channel-card .card-footer{ color: var(--accent); }

        .twitch-wrapper { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 0.75rem; }
        .twitch-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; border-radius: 0.75rem; }

        #checking-spinner { animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen hero-gradient pb-20">

<header class="container mx-auto px-6 py-12 text-center">
    <h1 class="text-6xl md:text-8xl font-black italic tracking-tighter uppercase mb-2">
        VPIN<span class="text-orange-500">HUB</span> <span class="text-cyan-400">TV</span>
    </h1>
    <p class="medieval text-gray-400 tracking-[0.3em] uppercase text-sm">Virtual Pinball Live Streams</p>
</header>

<main class="container mx-auto px-6 max-w-7xl">

    <!-- Status bar -->
    <div id="status-bar" class="flex items-center justify-center gap-3 mb-10 text-xs font-bold uppercase tracking-widest text-gray-500">
        <svg id="checking-spinner" class="w-4 h-4 text-cyan-500" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path>
        </svg>
        <span id="status-text">Checking streams...</span>
    </div>

    <!-- Live player (shown when someone is live) -->
    <section id="player-section" class="hidden mb-12">
        <div class="glass rounded-2xl overflow-hidden border border-white/10 shadow-2xl">
            <div class="bg-white/5 px-6 py-3 border-b border-white/10 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="live-badge"><span class="live-dot"></span>Live Now</div>
                    <span id="player-name" class="text-sm font-black uppercase tracking-widest text-white"></span>
                </div>
                <div class="flex items-center gap-4">
                    <div id="channel-switcher" class="hidden items-center gap-2 text-[10px] font-bold uppercase tracking-widest">
                        <button onclick="cycleChannel(-1)" class="text-gray-400 hover:text-white transition-colors">◀ Prev</button>
                        <span class="text-white/20">|</span>
                        <button onclick="cycleChannel(1)" class="text-gray-400 hover:text-white transition-colors">Next ▶</button>
                    </div>
                    <span class="text-white/20">|</span>
                    <div class="flex items-center gap-2 text-[10px] font-bold uppercase tracking-widest">
                        <button id="chat-toggle-btn" onclick="toggleChat()" class="text-gray-400 hover:text-cyan-400 transition-colors">Chat ☰</button>
                        <span class="text-white/20">|</span>
                        <button onclick="popoutChat()" class="text-gray-400 hover:text-white transition-colors">Pop Out ↗</button>
                    </div>
                    <span class="text-white/20">|</span>
                    <a id="player-twitch-link" href="#" target="_blank"
                       class="text-[10px] font-bold uppercase tracking-widest text-gray-400 hover:text-white transition-colors">
                        Open on Twitch ↗
                    </a>
                </div>
            </div>
            <div class="p-4">
                <div class="flex flex-col lg:flex-row gap-4">
                    <div class="flex-1 min-w-0">
                        <div class="twitch-wrapper">
                            <iframe id="twitch-player" src="" allowfullscreen allow="autoplay; fullscreen"></iframe>
                        </div>
                    </div>
                    <div id="chat-panel" class="hidden w-full lg:w-80 xl:w-96 flex-shrink-0">
                        <iframe id="twitch-chat" src=""
                            style="width:100%;height:100%;min-height:500px;border:none;border-radius:0.75rem;"
                            allowfullscreen>
                        </iframe>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Offline player (shown when no streams are live) -->
    <section id="offline-player" class="hidden mb-12">
        <div class="glass rounded-2xl overflow-hidden border border-white/10 shadow-2xl">
            <div class="bg-white/5 px-6 py-3 border-b border-white/10 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <span class="offline-badge">📺 Offline</span>
                    <span id="offline-playlist-title" class="text-sm font-black uppercase tracking-widest text-gray-400"></span>
                </div>
                <div id="playlist-switcher" class="hidden items-center gap-2 text-[10px] font-bold uppercase tracking-widest">
                    <button onclick="cyclePlaylist(-1)" class="text-gray-400 hover:text-white transition-colors">◀ Prev</button>
                    <span class="text-white/20">|</span>
                    <span id="playlist-counter" class="text-gray-500"></span>
                    <span class="text-white/20">|</span>
                    <button onclick="cyclePlaylist(1)" class="text-gray-400 hover:text-white transition-colors">Next ▶</button>
                </div>
            </div>
            <div class="p-4">
                <p class="text-center text-xs text-gray-500 italic mb-4">Nobody is live right now — enjoy these pre-recorded streams from the VPinHub community.</p>
                <div class="twitch-wrapper">
                    <div id="yt-player"></div>
                </div>
            </div>
        </div>
    </section>

    <!-- Live channel grid -->
    <div id="streams-section" class="hidden">
        <div class="mb-4">
            <h2 class="text-xs font-black uppercase tracking-widest text-gray-500">Live Now</h2>
            <div class="border-b border-white/5 mt-2 mb-6"></div>
        </div>
        <div id="channel-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>

</main>

<script>
    const TWITCH_EMBED = 'https://player.twitch.tv/?parent=vpinhub.com&parent=vpinhub.github.io&parent=localhost&channel=';
    const TWITCH_CHAT  = ch => `https://www.twitch.tv/embed/${ch}/chat?darkpopout&parent=vpinhub.com&parent=vpinhub.github.io&parent=localhost`;

    let streamers         = [];
    let playlists         = [];
    let liveChannels      = [];
    let activeChannel     = null;
    let activePlaylistIdx = 0;
    let chatOpen          = false;

    // ── YouTube iframe API ──────────────────────────────────────────────────
    let ytPlayer          = null;
    let ytApiReady        = false;
    let pendingPlaylistId = null;

    // Injected by YouTube — must be on window
    window.onYouTubeIframeAPIReady = function() {
        ytApiReady = true;
        if (pendingPlaylistId) {
            createYouTubePlayer(pendingPlaylistId);
            pendingPlaylistId = null;
        }
    };

    (function() {
        const tag = document.createElement('script');
        tag.src = 'https://www.youtube.com/iframe_api';
        document.head.appendChild(tag);
    })();

    function createYouTubePlayer(playlistId) {
        if (!ytApiReady) { pendingPlaylistId = playlistId; return; }
        ytPlayer = new YT.Player('yt-player', {
            playerVars: { listType: 'playlist', list: playlistId, autoplay: 1, rel: 0 },
            events: {
                onReady: function(e) {
                    e.target.setShuffle(true);
                    e.target.setLoop(true);
                    e.target.playVideo();
                }
            }
        });
    }

    // ── Colour helpers ──────────────────────────────────────────────────────
    const COLOR_BORDERS = {
        amber: 'border-amber-500', emerald: 'border-emerald-500', cyan: 'border-cyan-500',
        fuchsia: 'border-fuchsia-500', orange: 'border-orange-500', indigo: 'border-indigo-500',
    };

    function renderCard(streamer) {
        const color  = streamer.color || 'cyan';
        const border = COLOR_BORDERS[color] || 'border-cyan-500';
        return `
        <div class="channel-card color-${color} glass rounded-2xl p-6 border-t-4 card-border ${border} ${activeChannel === streamer.channel ? 'active' : ''}"
             onclick="selectChannel('${streamer.channel}', '${streamer.name}')"
             data-channel="${streamer.channel}">
            <div class="flex justify-between items-start mb-4">
                <span class="card-tag text-[10px] font-black uppercase tracking-widest px-3 py-1 rounded-full">${streamer.schedule}</span>
                <div class="live-badge"><span class="live-dot"></span>Live</div>
            </div>
            <h3 class="text-xl font-black uppercase italic leading-tight mb-1">${streamer.name}</h3>
            <p class="text-gray-400 text-[10px] font-bold uppercase tracking-widest mb-3">${streamer.channel} &middot; ${streamer.game}</p>
            <p class="text-gray-500 text-xs italic leading-relaxed">${streamer.description}</p>
            <div class="mt-6 pt-4 border-t border-white/5 card-footer font-bold uppercase text-[10px] tracking-widest flex justify-between items-center">
                <span>Watch Now</span><span>▶</span>
            </div>
        </div>`;
    }

    function selectChannel(channel, name) {
        if (!liveChannels.includes(channel)) return;
        activeChannel = channel;
        document.getElementById('twitch-player').src      = TWITCH_EMBED + channel;
        document.getElementById('player-name').textContent = name;
        document.getElementById('player-twitch-link').href = 'https://twitch.tv/' + channel;
        if (chatOpen) document.getElementById('twitch-chat').src = TWITCH_CHAT(channel);

        const switcher = document.getElementById('channel-switcher');
        switcher.classList.toggle('hidden', liveChannels.length <= 1);
        switcher.classList.toggle('flex',   liveChannels.length > 1);

        document.querySelectorAll('.channel-card').forEach(c =>
            c.classList.toggle('active', c.dataset.channel === channel));

        document.getElementById('player-section').classList.remove('hidden');
        document.getElementById('offline-player').classList.add('hidden');
        if (ytPlayer) ytPlayer.stopVideo();
        document.getElementById('player-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function cycleChannel(direction) {
        const idx = liveChannels.indexOf(activeChannel);
        const ch  = liveChannels[(idx + direction + liveChannels.length) % liveChannels.length];
        selectChannel(ch, streamers.find(s => s.channel === ch).name);
    }

    function showOfflinePlayer() {
        if (!playlists.length) return;
        const pl = playlists[activePlaylistIdx];
        document.getElementById('offline-playlist-title').textContent = pl.title;

        const switcher = document.getElementById('playlist-switcher');
        switcher.classList.toggle('hidden', playlists.length <= 1);
        switcher.classList.toggle('flex',   playlists.length > 1);
        if (playlists.length > 1) {
            document.getElementById('playlist-counter').textContent =
                `${activePlaylistIdx + 1} / ${playlists.length}`;
        }

        document.getElementById('offline-player').classList.remove('hidden');

        if (ytPlayer) {
            // Swap playlist and re-shuffle
            ytPlayer.setShuffle(true);
            ytPlayer.loadPlaylist({ list: pl.id, listType: 'playlist' });
        } else {
            createYouTubePlayer(pl.id);
        }
    }

    function cyclePlaylist(direction) {
        activePlaylistIdx = (activePlaylistIdx + direction + playlists.length) % playlists.length;
        showOfflinePlayer();
    }

    function toggleChat() {
        chatOpen = !chatOpen;
        const panel = document.getElementById('chat-panel');
        const btn   = document.getElementById('chat-toggle-btn');
        if (chatOpen) {
            document.getElementById('twitch-chat').src = TWITCH_CHAT(activeChannel);
            panel.classList.remove('hidden');
            btn.textContent = 'Hide Chat';
            btn.classList.replace('hover:text-cyan-400', 'hover:text-red-400');
        } else {
            panel.classList.add('hidden');
            document.getElementById('twitch-chat').src = '';
            btn.textContent = 'Chat ☰';
            btn.classList.replace('hover:text-red-400', 'hover:text-cyan-400');
        }
    }

    function popoutChat() {
        if (activeChannel) window.open(
            `https://www.twitch.tv/popout/${activeChannel}/chat?popout=`,
            'twitch-chat-popout', 'width=400,height=600,resizable=yes'
        );
    }

    function setStatus(text) {
        document.getElementById('checking-spinner').style.display = 'none';
        document.getElementById('status-text').textContent = text;
    }

    async function fetchLive() {
        const r = await fetch('live_status.json?t=' + Date.now());
        const s = await r.json();
        return { live: s.live || [], updated: new Date(s.updated) };
    }

    function applyLive(live) {
        liveChannels = live;
        const liveStreamers = streamers.filter(s => live.includes(s.channel));

        if (liveStreamers.length > 0) {
            document.getElementById('channel-grid').innerHTML = liveStreamers.map(renderCard).join('');
            document.getElementById('streams-section').classList.remove('hidden');
            document.getElementById('offline-player').classList.add('hidden');
            if (ytPlayer) ytPlayer.stopVideo();

            if (!activeChannel || !live.includes(activeChannel)) {
                selectChannel(liveStreamers[0].channel, liveStreamers[0].name);
            } else {
                document.querySelectorAll('.channel-card').forEach(c =>
                    c.classList.toggle('active', c.dataset.channel === activeChannel));
            }
        } else {
            document.getElementById('streams-section').classList.add('hidden');
            document.getElementById('channel-grid').innerHTML = '';
            if (activeChannel) {
                document.getElementById('twitch-player').src = '';
                document.getElementById('player-section').classList.add('hidden');
                activeChannel = null;
                if (chatOpen) toggleChat();
            }
            showOfflinePlayer();
        }
    }

    async function refresh() {
        try {
            const { live, updated } = await fetchLive();
            const age    = Math.round((Date.now() - updated) / 60000);
            const ageStr = age < 1 ? 'just now' : `${age}m ago`;
            setStatus(live.length > 0
                ? `${live.length} stream${live.length !== 1 ? 's' : ''} live · checked ${ageStr}`
                : `No streams live · checked ${ageStr}`
            );
            applyLive(live);
        } catch (err) {
            console.error('VPINHUB TV refresh error:', err);
            setStatus('Could not load stream data — please try refreshing');
            showOfflinePlayer();
        }
    }

    async function init() {
        try {
            [streamers, playlists] = await Promise.all([
                fetch('vpinhub_tv.json').then(r => r.json()),
                fetch('playlists.json').then(r => r.json()).catch(() => []),
            ]);
        } catch (err) {
            console.error('VPINHUB TV init error:', err);
            setStatus('Could not load channel list — please try refreshing');
            showOfflinePlayer();
            return;
        }
        await refresh();
        setInterval(() => { if (!activeChannel) refresh(); }, 5 * 60 * 1000);
    }

    init();
</script>
</body>
</html>
